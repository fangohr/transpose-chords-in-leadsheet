[workspace]
name = "chord-transpose"
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "win-64"]

[dependencies]
python = ">=3.14.4,<3.15"
pytest = ">=9.0.3,<10"

[pypi-dependencies]
chord-transpose = { path = ".", editable = true }

[tasks]
test = "pytest -v"
example = "transpose-chords songs/scarborough-fair.txt +2"
cli-help = "transpose-chords --help"
